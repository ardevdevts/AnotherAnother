name: Release

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: "Platforms to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - linux
          - windows
          - linux,windows
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-notes:
    runs-on: ubuntu-latest
    outputs:
      notes: ${{ steps.notes.outputs.notes }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(jq -r .version src-tauri/tauri.conf.json)
            echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s" --no-merges HEAD)
          else
            LOG=$(git log --pretty=format:"- %s" --no-merges "$PREV_TAG"..HEAD)
          fi
          if [ -z "$LOG" ]; then
            LOG="- Bug fixes and improvements"
          fi

          NOTES=$(printf "## What's New\n\n%s" "$LOG")

          {
            echo "notes<<EOFDELIM"
            echo "$NOTES"
            echo "EOFDELIM"
          } >> "$GITHUB_OUTPUT"

  build-linux:
    needs: release-notes
    if: >-
      github.event_name == 'push' ||
      inputs.platforms == 'all' ||
      contains(inputs.platforms, 'linux')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Download Linux adb
        run: |
          curl -fsSL -o /tmp/platform-tools.zip https://dl.google.com/android/repository/platform-tools-latest-linux.zip
          unzip -jo /tmp/platform-tools.zip platform-tools/adb -d src-tauri/resources/

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.release-notes.outputs.tag }}
          releaseName: "Another ${{ needs.release-notes.outputs.tag }}"
          releaseBody: ${{ needs.release-notes.outputs.notes }}
          releaseDraft: false
          prerelease: false

  build-windows:
    needs: release-notes
    if: >-
      github.event_name == 'push' ||
      inputs.platforms == 'all' ||
      contains(inputs.platforms, 'windows')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Download Windows adb
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://dl.google.com/android/repository/platform-tools-latest-windows.zip" -OutFile "$env:TEMP\platform-tools.zip"
          Expand-Archive -Path "$env:TEMP\platform-tools.zip" -DestinationPath "$env:TEMP\platform-tools"
          Copy-Item "$env:TEMP\platform-tools\platform-tools\adb.exe" "src-tauri\resources\adb.exe"
          Copy-Item "$env:TEMP\platform-tools\platform-tools\AdbWinApi.dll" "src-tauri\resources\AdbWinApi.dll"
          Copy-Item "$env:TEMP\platform-tools\platform-tools\AdbWinUsbApi.dll" "src-tauri\resources\AdbWinUsbApi.dll"

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.release-notes.outputs.tag }}
          releaseName: "Another ${{ needs.release-notes.outputs.tag }}"
          releaseBody: ${{ needs.release-notes.outputs.notes }}
          releaseDraft: false
          prerelease: false